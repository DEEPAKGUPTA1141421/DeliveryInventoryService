spring.application.name=DeliveryInventoryService
server.port=8083

# ===== DB =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========= JWT =========
jwt.private.key.path=classpath:keys/private_key.pem
jwt.public.key.path=classpath:keys/public_key.pem
jwt.expiration.in.millis=1296000000

# ========= Client Credentials (inter-service auth) =========
client.id=${CLIENT_ID:product-client-service}
client.password=${CLIENT_PASSWORD:secret123}

# ========= Redis =========
spring.data.redis.host=192.168.1.106
spring.data.redis.port=6379
spring.data.redis.ssl.enabled=false 

# ===== Google API =====
google.api.key=${GOOGLE_API_KEY}

# ========= Elasticsearch =========
elasticsearch.url=${ELASTICSEARCH_URL}
elasticsearch.username=${ELASTICSEARCH_USERNAME}
elasticsearch.apiKey=${ELASTICSEARCH_API_KEY}

# ========= AWS S3 =========
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.s3.bucket-name=${AWS_S3_BUCKET}

# ========= Kafka =========
spring.kafka.bootstrap-servers=192.168.1.106:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=1
spring.kafka.consumer.group-id=delivery-delay-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.DeliveryInventoryService.DeliveryInventoryService.tracking
# Topic
app.kafka.topic.vehicle-location=vehicle.location.update

# ========= Cloudinary =========
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ===== Hibernate logging + batching =====
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# VRP: rider route assignment batch
myapp.cron.batch_order_from_city_and_assign_to_rider=0 */55 * * * *

# Auto-create inter-warehouse shipments for every active warehouse with AT_WAREHOUSE parcels.
# Default: every 30 minutes. Override per environment via env var or config server.
myapp.cron.shipment-auto-creation=0 */55 * * * *


# ══════════════════════════════════════════════════════════
# ADD THESE TO YOUR EXISTING application.properties
# ══════════════════════════════════════════════════════════

# ── Twilio (SMS + Voice calls) ─────────────────────────────
twilio.account.sid=${TWILIO_ACCOUNT_SID:MOCK}
twilio.auth.token=${TWILIO_AUTH_TOKEN:MOCK}
twilio.from.number=${TWILIO_FROM_NUMBER:+10000000000}
twilio.twiml.base.url=${TWILIO_TWIML_URL:https://your-service.com}

# ── Kafka Topics ────────────────────────────────────────────
app.kafka.topic.vehicle-location=vehicle.location.update
app.kafka.topic.parcel-lifecycle=parcel.lifecycle.events

# Trusted package for new event class
spring.kafka.consumer.properties.spring.json.trusted.packages=\
  com.DeliveryInventoryService.DeliveryInventoryService.tracking,\
  com.DeliveryInventoryService.DeliveryInventoryService.kafka

# ── Parcel / OTP config ─────────────────────────────────────
app.otp.ttl.minutes=10
app.shipment.max-parcels=50

# ── Cron: parcel ETA refresh ────────────────────────────────
# runs every 55 minutes to avoid overlapping with the 5-minute batch job
myapp.cron.inter_city_eta_refresh=0 */55 * * * *
myapp.cron.batch_order_from_city_and_assign_to_rider=0 */55 * * * *
