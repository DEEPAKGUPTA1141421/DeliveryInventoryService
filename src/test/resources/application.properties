# ===== DB =====
spring.datasource.url=jdbc:postgresql://localhost:5432/delivery_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
jwt.private.key.path=classpath:keys/private_key.pem
jwt.public.key.path=classpath:keys/public_key.pem
jwt.expiration.in.millis=1296000000

# ===== Redis =====
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.username=
spring.redis.password=
spring.redis.ssl=false
spring.redis.client-type=lettuce

# ===== Google API =====
google.api.key=test-key

# ===== Elasticsearch =====
elasticsearch.url=http://localhost:9200
elasticsearch.username=elastic
elasticsearch.apiKey=test-key

# ===== AWS S3 =====
cloud.aws.credentials.access-key=test
cloud.aws.credentials.secret-key=test
cloud.aws.region.static=ap-south-1
cloud.aws.s3.bucket-name=test-bucket

# ===== Kafka =====
kafka.bootstrap-servers=localhost:9092
kafka.sasl.username=test
kafka.sasl.password=test
kafka.jaas.template=org.apache.kafka.common.security.scram.ScramLoginModule required username="%s" password="%s";
kafka.truststore.password=test

# ===== Cloudinary =====
cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test
